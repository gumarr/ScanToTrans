<!doctype html>
<html>
  <head>
    <meta charset="utf-8" />
    <title>Capture</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@500;600&display=swap" rel="stylesheet" />
    <style>
      * { margin: 0; padding: 0; box-sizing: border-box; }
      html, body { width: 100%; height: 100%; overflow: hidden; cursor: crosshair;
        user-select: none; background: rgba(6, 6, 16, 0.35); }
      #sel { position: fixed; border: 2px solid #8b5cf6; background: rgba(124, 58, 237, 0.12);
        display: none; pointer-events: none;
        box-shadow: 0 0 12px rgba(124, 58, 237, 0.3), inset 0 0 8px rgba(59, 130, 246, 0.1); }
      #hint { position: fixed; top: 16px; left: 50%; transform: translateX(-50%);
        font: 13px/1.4 'Inter', system-ui, sans-serif; font-weight: 500;
        color: #e8e4f0; background: rgba(12, 12, 24, 0.8);
        backdrop-filter: blur(12px); -webkit-backdrop-filter: blur(12px);
        padding: 8px 18px; border-radius: 10px; pointer-events: none;
        border: 1px solid rgba(138, 100, 255, 0.2);
        box-shadow: 0 4px 16px rgba(0, 0, 0, 0.4); }
    </style>
  </head>
  <body>
    <div id="hint">Kéo để chọn vùng OCR · Esc để hủy</div>
    <div id="sel"></div>
    <script type="module" src="./overlay.js"></script>
  </body>
</html>
